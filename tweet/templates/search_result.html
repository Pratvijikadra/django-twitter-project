{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">
        Search Results : "{{ query }}"
    </h3>

    {% if tweets %}

    <div class="container row g-4">

        {% for tweet in tweets %}

        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="card h-100 border-2">

                <!-- Image -->
                <img src="{{tweet.photo.url}}" class="card-img-top object-fit-cover" alt="tweet image"
                    style="height: 250px;">

                <!-- Card Body -->
                <div class="card-body d-flex flex-column">

                    <h5 class="card-title">
                        {{tweet.user.username}}
                    </h5>

                    <p class="card-text flex-grow-1">
                        {{tweet.text}}
                    </p>

                    {% if tweet.user == user %}
                    <!-- Buttons Bottom -->
                    <div class="mt-auto d-flex gap-2">
                        <a href="{% url 'tweet_edit' tweet.id %}" class="btn btn-primary w-50">
                            Edit
                        </a>

                        <a href="{% url 'tweet_delete' tweet.id %}" class="btn btn-danger w-50">
                            Delete
                        </a>
                    </div>
                    {% endif %}

                </div>
            </div>
        </div>

        {% endfor %}

    </div>

    {% else %}

    <h2>Search Not Found</h2>

    {% endif %}

</div>

{% endblock %}
